<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>給你的專屬補給站 ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 50%, #9a3412 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            overflow-x: hidden; 
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .passcode-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        .passcode-input:focus {
            border-color: #ec4899;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        .error-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .hidden-modal { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .show-modal { opacity: 1; pointer-events: auto; }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        .floating-heart { position: fixed; bottom: 80px; right: 30px; color: #ec4899; font-size: 24px; pointer-events: none; animation: floatUp 2s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-200px) scale(1.5); opacity: 0; } }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .scratch-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; z-index: 10; transition: opacity 0.5s ease-out; }
    </style>
</head>
<body class="pb-32 relative">

    <div id="auth-overlay">
        <div class="text-center p-6 max-w-sm w-full">
            <div class="mb-8">
                <i data-lucide="lock" class="w-12 h-12 text-pink-400 mx-auto mb-4"></i>
                <h1 class="text-2xl font-bold text-white">身分驗證</h1>
                <p class="text-white/60 text-sm mt-2">請輸入你的生日以開啟補給站 (0327)</p>
            </div>
            <div id="passcode-container" class="flex justify-center gap-3 mb-6">
                <input type="password" maxlength="1" class="passcode-input" autofocus>
                <input type="password" maxlength="1" class="passcode-input">
                <input type="password" maxlength="1" class="passcode-input">
                <input type="password" maxlength="1" class="passcode-input">
            </div>
            <p id="auth-error" class="text-pink-500 text-sm font-bold opacity-0 transition-opacity">密碼錯誤，再試一次 ❤️</p>
        </div>
    </div>

    <div id="stars-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <header class="relative z-10 pt-20 pb-10 px-6 text-center">
        <h1 class="text-3xl font-bold mb-2 flex justify-center items-center gap-2 text-white">
            <i data-lucide="mail-heart" class="text-pink-300 w-8 h-8"></i>
            補給站
        </h1>
        <p class="text-sm text-pink-200 opacity-90">專屬你的 19 天陪伴計畫</p>
    </header>

    <main class="relative z-10 px-6 max-w-lg mx-auto">
        <div id="cards-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div class="fixed bottom-6 right-6 z-40 flex flex-col items-center">
        <div id="heart-count" class="bg-white/20 backdrop-blur text-white text-xs px-2 py-1 rounded-full mb-2 font-bold opacity-0 transition-opacity">0</div>
        <button onclick="window.sendHeart()" class="bg-pink-500 text-white rounded-full p-4 shadow-lg active:scale-90 flex items-center justify-center">
            <i data-lucide="heart" class="w-6 h-6 fill-current"></i>
        </button>
    </div>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden-modal px-4">
        <div class="glass-card bg-white/20 p-6 max-w-sm w-full relative max-h-[90vh] overflow-y-auto">
            <button onclick="window.closeModal()" class="absolute top-4 right-4 text-white/80 bg-black/20 rounded-full p-1 z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="text-center mt-2">
                <h2 id="modal-day" class="text-sm text-pink-300 font-bold uppercase mb-1"></h2>
                <h3 id="modal-title" class="text-xl font-bold mb-4 text-white"></h3>
                <div id="modal-image-container" class="mb-4 hidden rounded-lg overflow-hidden border border-white/20">
                    <img id="modal-image" src="" alt="驚喜" class="w-full h-auto object-cover max-h-48">
                </div>
                <div id="modal-video-container" class="mb-4 hidden rounded-lg overflow-hidden">
                    <div class="video-container" id="video-wrapper"></div>
                </div>
                <p id="modal-content" class="text-base text-white/90 leading-relaxed mb-6 text-left whitespace-pre-line"></p>
                <div class="border-t border-white/20 pt-4 mt-2 text-left">
                    <p class="text-sm text-pink-200 font-bold mb-2">任務回報 / 留言：</p>
                    <div id="reply-display" class="hidden bg-white/10 p-3 rounded-lg text-sm mb-4 text-white border border-white/10"></div>
                    <div id="reply-form" class="flex gap-2">
                        <input type="text" id="reply-input" placeholder="寫點什麼..." class="flex-1 bg-black/30 border border-white/30 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-pink-400">
                        <button onclick="window.submitReply()" class="bg-pink-500 text-white px-4 py-2 rounded-lg text-sm font-bold">送出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // 已填入你的專屬 Firebase Key
        const firebaseConfig = {
            apiKey: "AIzaSyCI0hlmp22FEPeS5Tbh0-o7-q76djszCmM",
            authDomain: "my-surprised.firebaseapp.com",
            projectId: "my-surprised",
            storageBucket: "my-surprised.firebasestorage.app",
            messagingSenderId: "934203264894",
            appId: "1:934203264894:web:61fbd63c455e07af13ad2f"
        };

        let db, auth, user, currentOpenedDayIndex;
        const app_id_folder = "my-surprise-app";

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            signInAnonymously(auth).then(cred => {
                user = cred.user;
                syncHearts();
            });
        } catch (e) { console.error("Firebase Init Error", e); }

        lucide.createIcons();

        // 密碼鎖
        const inputs = document.querySelectorAll('.passcode-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
                const code = Array.from(inputs).map(i => i.value).join('');
                if (code === "0327") {
                    document.getElementById('auth-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('auth-overlay').style.display = 'none', 500);
                } else if (code.length === 4) {
                    document.getElementById('passcode-container').classList.add('error-shake');
                    document.getElementById('auth-error').classList.remove('opacity-0');
                    setTimeout(() => {
                        inputs.forEach(i => i.value = '');
                        inputs[0].focus();
                        document.getElementById('passcode-container').classList.remove('error-shake');
                    }, 600);
                }
            });
        });

        const surprisesData = [
            { day: 1, date: '2026-04-20', title: '啟動日！送你一個笑容', content: '辛苦啦！接下來的19天，每天下班記得來這裡領取驚喜喔！雖然隔著距離，但我一直都在。', image: 'https://images.unsplash.com/photo-1718420432340-3ae70488ebd5?q=80&w=687&auto=format&fit=crop', icon: 'rocket' },
            { day: 2, date: '2026-04-21', title: '美食的誘惑', content: '放假日~~放上一張你愛的臭豆腐！別流口水等你回來就可以吃吃吃吃吃啦', image: 'https://images.unsplash.com/photo-1657251867365-912394b305ea?q=80&w=1170&auto=format&fit=crop', icon: 'utensils' },
            { day: 3, date: '2026-04-22', title: '驚喜刮刮樂', content: '今天心情還好嗎？刮開看看我給你的悄悄話。', icon: 'ticket' }
            // ... 可在此增加更多天數
        ];

        window.renderCards = () => {
            const grid = document.getElementById('cards-grid');
            const today = new Date().toISOString().split('T')[0];
            surprisesData.forEach((data, index) => {
                const isUnlocked = today >= data.date;
                const card = document.createElement('div');
                card.className = `glass-card p-4 flex flex-col items-center justify-center aspect-square ${isUnlocked ? 'opacity-100 cursor-pointer' : 'opacity-50 cursor-not-allowed'}`;
                card.innerHTML = `<div class="text-xs opacity-60 mb-2">${data.date.substring(5)}</div><i data-lucide="${isUnlocked ? data.icon : 'lock'}" class="w-8 h-8 mb-2"></i><div class="font-bold text-sm">Day ${data.day}</div>`;
                card.onclick = () => isUnlocked ? openModal(index) : null;
                grid.appendChild(card);
            });
            lucide.createIcons();
        };

        window.openModal = (index) => {
            currentOpenedDayIndex = index;
            const data = surprisesData[index];
            document.getElementById('modal-day').innerText = `Day ${data.day}`;
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-content').innerText = data.content;
            document.getElementById('modal-image-container').classList.toggle('hidden', !data.image);
            if(data.image) document.getElementById('modal-image').src = data.image;
            document.getElementById('modal').classList.replace('hidden-modal', 'show-modal');
            loadReply(data.day);
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('show-modal', 'hidden-modal');

        async function syncHearts() {
            if (!db) return;
            onSnapshot(doc(db, 'interactions', 'hearts'), s => {
                document.getElementById('heart-count').innerText = s.data()?.count || 0;
                document.getElementById('heart-count').classList.remove('opacity-0');
            });
        }

        window.sendHeart = async () => {
            const h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'floating-heart';
            document.body.appendChild(h); setTimeout(() => h.remove(), 2000);
            if (db) await setDoc(doc(db, 'interactions', 'hearts'), { count: increment(1) }, { merge: true });
        };

        function loadReply(day) {
            if (!db) return;
            onSnapshot(doc(db, 'replies', `day_${day}`), s => {
                if (s.exists()) {
                    document.getElementById('reply-display').innerText = s.data().text;
                    document.getElementById('reply-display').classList.remove('hidden');
                    document.getElementById('reply-form').classList.add('hidden');
                } else {
                    document.getElementById('reply-display').classList.add('hidden');
                    document.getElementById('reply-form').classList.remove('hidden');
                }
            });
        }

        window.submitReply = async () => {
            const val = document.getElementById('reply-input').value;
            if (!val || !db) return;
            const day = surprisesData[currentOpenedDayIndex].day;
            await setDoc(doc(db, 'replies', `day_${day}`), { text: val });
            document.getElementById('reply-input').value = '';
        };

        window.renderCards();
    </script>
</body>
</html>
